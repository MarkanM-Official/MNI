services:
  # Python Backend (Flask)
  - type: web
    name: mni-automation-backend
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn backend.app:app --bind 0.0.0.0:$PORT --workers 2
    healthCheckPath: /healthz
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: FLASK_DEBUG
        value: "False"
      - key: ADMIN_PASSWORD
        sync: false
      - key: ADMIN_SECRET_KEY
        generateValue: true
      - key: MNI_SECRET_KEY
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: DISCORD_BOT_TOKEN
        sync: false
      - key: WHATSAPP_ACCESS_TOKEN
        sync: false
      - key: WHATSAPP_PHONE_NUMBER_ID
        sync: false
      - key: INSTAGRAM_ACCESS_TOKEN
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: ELEVENLABS_API_KEY
        sync: false
      - key: BACKEND_URL
        sync: false
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
      - key: GOOGLE_REFRESH_TOKEN
        sync: false
      - key: EMAIL_SMTP_HOST
        sync: false
      - key: EMAIL_SMTP_PORT
        sync: false
      - key: EMAIL_SMTP_USERNAME
        sync: false
      - key: EMAIL_SMTP_PASSWORD
        sync: false
      - key: EMAIL_FROM
        sync: false

  # Node.js Bot Layer
  - type: worker
    name: mni-automation-bots
    runtime: node
    buildCommand: npm install
    startCommand: node bot/index.js
    envVars:
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: DISCORD_BOT_TOKEN
        sync: false
      - key: BACKEND_URL
        sync: false
